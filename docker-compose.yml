version: "3.9"

services:
  backend:
    build: ./docker/backend
    container_name: ml_backend
    volumes:
      - ./backend:/app
      - ./ontology:/ontology
    ports:
      - "8000:8000"
    depends_on:
      - fuseki

  fuseki:
    image: stain/jena-fuseki
    container_name: fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
    volumes:
      - ./ontology:/fuseki-data